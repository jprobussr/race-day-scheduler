<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Day Scheduler</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    
    <header>
        <div class="header-row">
            <div>
                <h1>Race Day Scheduler</h1>
                <p>Find your race time  and number</p>
            </div>

            <button id="themeToggle" aria-pressed="false" aria-label="Toggle Theme">🌙</button>
        </div>
    </header>

    <main>
      <section>
        <form id="raceForm">
          <label for="age">Age</label>
          <input type="number" id="age" required />

          <label>
            <input type="checkbox" id="registeredEarly" />
            Registered Early
          </label>

          <button type="submit">Check Race Time</button>
        </form>

        <div id="result" aria-live="polite">
         <h2>Race Details</h2>
         <p>Enter your age and registration status to see your schedule.</p>
        </div>
      </section>
    </main>

    <footer>
      <p>Built for JavaScript practice</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
